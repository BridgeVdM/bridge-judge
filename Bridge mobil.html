<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bridge Judge PRO</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.box { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
input, select { margin:5px; padding:5px; }
button { margin:5px; padding:10px; }
.error { color:red; }
.done { color:green; font-weight:bold; }
input:disabled { background:#ddd; }
</style>

</head>
<body>

<h2>Bridge Judge PRO</h2>

<div class="box">
<h3>Franja</h3>

<select id="franja">
<option value="0">Franja 1</option>
<option value="1">Franja 2</option>
<option value="2">Franja 3</option>
</select>

<div id="infoFranja"></div>
</div>

<div class="box">
<h3>Configuració (fixa per franja)</h3>

Taula 1:
V <select id="t1V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t1H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br><br>

Taula 2:
V <select id="t2V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t2H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br>
<button id="btnGuardar">Guardar configuració</button>
</div>

<div class="box">
<h3>Resultats</h3>

Taula 1:
<input id="t1x" placeholder="x">
<input id="t1y" placeholder="y"><br>

Taula 2:
<input id="t2x" placeholder="x">
<input id="t2y" placeholder="y">
</div>

<button id="btnCalc">Calcular ronda</button>
<button id="btnNova">Nova ronda</button>
<button id="btnReset">Reset sessió</button>

<h3>Resultat</h3>
<div id="resultat"></div>

<h3>Historial</h3>
<div id="historial"></div>

<h3>Ranking</h3>
<div id="ranking"></div>

<script>

let configuracions=[null,null,null];
let comptador=[0,0,0];
let historial=[[],[],[]];
let ranking=[0,0,0,0];

// BLOQUEIG
function bloquejarCamps(){
t1x.disabled=true; t1y.disabled=true;
t2x.disabled=true; t2y.disabled=true;
}

function desbloquejarCamps(){
t1x.disabled=false; t1y.disabled=false;
t2x.disabled=false; t2y.disabled=false;
}

// INFO FRANJA
function actualitzarInfo(){
let f=franja.value;
let txt="";

if(configuracions[f]){
txt+="✔ Configurada<br>Jocs: "+comptador[f]+"/8";
}else{
txt+="❌ No configurada";
}

if(comptador[f]===8){
txt+="<br><span class='done'>Franja completada</span>";
}

infoFranja.innerHTML=txt;
}

// GUARDAR CONFIG
function guardarConfiguracio(){

let f=franja.value;

if(comptador[f]>0){
alert("No es pot canviar configuració iniciada");
return;
}

let vals=[t1V.value,t1H.value,t2V.value,t2H.value];

if(vals.includes("")){
alert("Falten parelles");
return;
}

if(new Set(vals).size!==4){
alert("Parelles repetides");
return;
}

configuracions[f]={
t1V:Number(t1V.value),
t1H:Number(t1H.value),
t2V:Number(t2V.value),
t2H:Number(t2H.value)
};

actualitzarInfo();
}

// CALCULAR
function calcular(){

let f=franja.value;
let config=configuracions[f];

if(!config){
alert("Configura la franja");
return;
}

if(comptador[f]>=8){
alert("Franja completa");
return;
}

let x1=t1x.value, y1=t1y.value;
let x2=t2x.value, y2=t2y.value;

if((x1 && y1)||(!x1 && !y1)){
alert("Taula 1 incorrecta");
return;
}

if((x2 && y2)||(!x2 && !y2)){
alert("Taula 2 incorrecta");
return;
}

x1=Number(x1)||0; y1=Number(y1)||0;
x2=Number(x2)||0; y2=Number(y2)||0;

let p1 = x1!==0 ? config.t1V : config.t1H;
let p2 = x2!==0 ? config.t2V : config.t2H;

let val1 = x1!==0 ? x1 : y1;
let val2 = x2!==0 ? x2 : y2;

let punts=[0,0,0,0];

if(val1===val2){
punts=[1,1,1,1];
}else{

let g = val1>val2 ? p1 : p2;
let p = val1>val2 ? p2 : p1;

function rival(x){
if(x===config.t1V) return config.t1H;
if(x===config.t1H) return config.t1V;
if(x===config.t2V) return config.t2H;
return config.t2V;
}

punts[g]=2;
punts[rival(g)]=0;
punts[p]=0;
punts[rival(p)]=2;
}

// acumulat
for(let i=0;i<4;i++) ranking[i]+=punts[i];

historial[f].push(punts);
comptador[f]++;

// OUTPUT
resultat.innerHTML =
"P1: "+punts[0]+"<br>"+
"P2: "+punts[1]+"<br>"+
"P3: "+punts[2]+"<br>"+
"P4: "+punts[3];

// HISTORIAL
let h="";
for(let fr=0;fr<3;fr++){
h+="<b>Franja "+(fr+1)+"</b><br>";
historial[fr].forEach((r,i)=>{
h+="Joc "+(i+1)+": "+r.join(", ")+"<br>";
});
h+="<br>";
}
historialDiv.innerHTML=h;

// RANKING
rankingDiv.innerHTML =
"P1: "+ranking[0]+"<br>"+
"P2: "+ranking[1]+"<br>"+
"P3: "+ranking[2]+"<br>"+
"P4: "+ranking[3];

// BLOQUEIG
bloquejarCamps();
actualitzarInfo();
}

// NOVA RONDA
function novaRonda(){
t1x.value=""; t1y.value="";
t2x.value=""; t2y.value="";
desbloquejarCamps();
}

// RESET
function resetSessio(){
configuracions=[null,null,null];
comptador=[0,0,0];
historial=[[],[],[]];
ranking=[0,0,0,0];

resultat.innerHTML="";
historialDiv.innerHTML="";
rankingDiv.innerHTML="";
infoFranja.innerHTML="";
}

// EVENT LISTENERS (CLAU PER MÒBIL)
window.onload = function(){
btnCalc.addEventListener("click", calcular);
btnNova.addEventListener("click", novaRonda);
btnReset.addEventListener("click", resetSessio);
btnGuardar.addEventListener("click", guardarConfiguracio);
franja.addEventListener("change", actualitzarInfo);
};

</script>

</body>
</html>
