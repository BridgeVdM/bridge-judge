<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bridge Judge FINAL</title>

<style>
body { font-family: Arial; padding:20px; background:#f2f2f2;}
.box { background:white; padding:15px; margin-bottom:15px; border-radius:8px;}
input, select { margin:5px; padding:5px;}
button { padding:10px; margin:5px;}
</style>
</head>

<body>

<h2>Bridge Judge FINAL</h2>

<div class="box">
<h3>Franja</h3>
<div id="info"></div>
</div>

<div class="box">
<h3>Configuració P</h3>

Taula 1:
NS <select id="t1V">
<option value="">--</option>
<option value="0">P1</option><option value="1">P2</option>
<option value="2">P3</option><option value="3">P4</option>
</select>

EO <select id="t1H">
<option value="">--</option>
<option value="0">P1</option><option value="1">P2</option>
<option value="2">P3</option><option value="3">P4</option>
</select>

<br><br>

Taula 2:
NS <select id="t2V">
<option value="">--</option>
<option value="0">P1</option><option value="1">P2</option>
<option value="2">P3</option><option value="3">P4</option>
</select>

EO <select id="t2H">
<option value="">--</option>
<option value="0">P1</option><option value="1">P2</option>
<option value="2">P3</option><option value="3">P4</option>
</select>

<br>
<button onclick="guardarP()">Guardar configuració</button>
</div>

<div class="box">
<h3>Declarants D</h3>

Taula 1:
<select id="d1">
<option value="">--</option>
<option value="0">NS</option>
<option value="1">EO</option>
</select>

Taula 2:
<select id="d2">
<option value="">--</option>
<option value="0">NS</option>
<option value="1">EO</option>
</select>
</div>

<div class="box">
<h3>Resultats M</h3>

Taula 1:
<input id="t1v" placeholder="NS">
<input id="t1h" placeholder="EO"><br>

Taula 2:
<input id="t2v" placeholder="NS">
<input id="t2h" placeholder="EO">
</div>

<button onclick="calcular()">Calcular ronda</button>
<button onclick="nova()">Nova ronda</button>
<button onclick="reset()">Reset</button>

<h3>Resultat</h3>
<div id="res"></div>

<h3>Ranking</h3>
<div id="rank"></div>

<h3>Historial</h3>
<div id="hist"></div>

<script>

function $(id){ return document.getElementById(id); }

let P=[null,null,null];
let H=[[],[],[]];
let R=[0,0,0,0];

let ronda=0;
let bloquejat=false;

// ---------- STORAGE ----------
function guardarDades(){
localStorage.setItem("bridgeData", JSON.stringify({P,H,R,ronda}));
}

function carregarDades(){
let d=localStorage.getItem("bridgeData");
if(!d) return;

let obj=JSON.parse(d);
P=obj.P;
H=obj.H;
R=obj.R;
ronda=obj.ronda;
}

// ---------- guardar P ----------
function guardarP(){

let f=Math.floor(ronda/8);

if(H[f].length>0){
alert("Franja bloquejada");
return;
}

let vals=[$("t1V").value,$("t1H").value,$("t2V").value,$("t2H").value];

if(vals.includes("")) return alert("Falten dades");
if(new Set(vals).size!==4) return alert("Repetides");

P[f]=[
[+vals[0],+vals[1]],
[+vals[2],+vals[3]]
];

alert("Configuració guardada");
guardarDades();
}

// ---------- rival ----------
function rival(x,P){
for(let i=0;i<2;i++){
if(P[i][0]===x) return P[i][1];
if(P[i][1]===x) return P[i][0];
}
}

// ---------- MOTOR ----------
function motor(P,D,M){

let pos=[];

// posicions no nul·les
for(let i=0;i<2;i++){
for(let j=0;j<2;j++){
if(M[i][j]) pos.push([i,j]);
}
}

// 🔥 CAS PRIORITARI (DEFINITIU)
if(D[0] !== D[1]){

let pts=[0,0,0,0];

for(let k=0;k<pos.length;k++){

let i=pos[k][0];
let j=pos[k][1];

let p=P[i][j];
let r=rival(p,P);

pts[p]=2;
pts[r]=0;
}

return pts;
}

// ---------- ALTRES CASOS ----------

let vals = pos.map(([i,j])=>M[i][j]);

let [i1,j1]=pos[0];
let [i2,j2]=pos[1];

let v1=vals[0], v2=vals[1];

let p1=P[i1][j1];
let p2=P[i2][j2];

function colDecl(i){
return (P[i][0]===D[i])?0:1;
}

let mateixaColDeclarant = (colDecl(i1)===colDecl(i2));
let mateixaColResultat = (j1===j2);

let pts=[0,0,0,0];

// CAS 1
if(mateixaColDeclarant && mateixaColResultat){

if(v1===v2) return [1,1,1,1];

let g=v1>v2?p1:p2;
let p=v1>v2?p2:p1;

pts[g]=2;
pts[p]=0;
pts[rival(g,P)]=0;
pts[rival(p,P)]=2;
}

// CAS 4
else if(mateixaColDeclarant && !mateixaColResultat){

for(let i=0;i<2;i++){

let decl=D[i];
let colDecl=(P[i][0]===decl)?0:1;
let colRes=(M[i][0]!==0)?0:1;

if(colDecl===colRes){
pts[decl]=2;
pts[rival(decl,P)]=0;
}else{
pts[decl]=0;
pts[rival(decl,P)]=2;
}
}
}

return pts;
}

// ---------- calcular ----------
function calcular(){

if(bloquejat) return alert("Ja calculat");

let f=Math.floor(ronda/8);
if(!P[f]) return alert("Configura franja");

if($("d1").value===""||$("d2").value==="") return alert("Falta D");

let D=[
P[f][0][$("d1").value],
P[f][1][$("d2").value]
];

let M=[
[+($("t1v").value)||0,+($("t1h").value)||0],
[+($("t2v").value)||0,+($("t2h").value)||0]
];

for(let i=0;i<2;i++){
if((M[i][0]&&M[i][1])||(!M[i][0]&&!M[i][1])){
return alert("Error taula "+(i+1));
}
}

// 🔍 DEBUG
console.log("------ DEBUG RONDA ------");
console.log("Franja:", f);
console.log("P actual:", JSON.stringify(P[f]));
console.log("D:", D);
console.log("M:", M);
console.log("-------------------------");

let pts=motor(P[f],D,M);

for(let i=0;i<4;i++) R[i]+=pts[i];

H[f].push(pts);

$("res").innerHTML=pts.join(" | ");

bloquejat=true;
ronda++;

if(ronda===8||ronda===16) alert("Canvi de franja");

guardarDades();
actualitzar();
}

// ---------- nova ----------
function nova(){
["t1v","t1h","t2v","t2h"].forEach(id=>$(id).value="");
$("d1").value="";
$("d2").value="";
bloquejat=false;
}

// ---------- reset ----------
function reset(){

if(!confirm("Reset total?")) return;

P=[null,null,null];
H=[[],[],[]];
R=[0,0,0,0];
ronda=0;
bloquejat=false;

localStorage.removeItem("bridgeData");

["t1v","t1h","t2v","t2h"].forEach(id=>$(id).value="");
["t1V","t1H","t2V","t2H"].forEach(id=>$(id).value="");

$("d1").value="";
$("d2").value="";

$("res").innerHTML="";
$("rank").innerHTML="";
$("hist").innerHTML="";

actualitzar();
}

// ---------- UI ----------
function actualitzar(){

let f=Math.floor(ronda/8);
$("info").innerHTML="Ronda "+(ronda+1)+" / 24 — Franja "+(f+1);

// ranking
let txt="";
R.forEach((v,i)=> txt+="P"+(i+1)+": "+v+"<br>");
$("rank").innerHTML=txt;

// historial
let htxt="";
for(let i=0;i<3;i++){
htxt+="<b>Franja "+(i+1)+"</b><br>";
H[i].forEach((r,j)=>{
htxt+="Joc "+(j+1)+": "+r.join(" | ")+"<br>";
});
htxt+="<br>";
}
$("hist").innerHTML=htxt;
}

// INIT
carregarDades();
actualitzar();

</script>

</body>
</html>
