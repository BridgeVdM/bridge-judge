<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bridge Judge PRO</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.box { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
input, select { margin:5px; padding:5px; }
button { margin:5px; padding:10px; }
.error { color:red; }
.done { color:green; font-weight:bold; }
input:disabled { background:#ddd; }
</style>

</head>
<body>

<h2>Bridge Judge PRO</h2>

<div class="box">
<h3>Franja</h3>

<select id="franja" onchange="canviarFranja()">
<option value="0">Franja 1</option>
<option value="1">Franja 2</option>
<option value="2">Franja 3</option>
</select>

<div id="infoFranja"></div>
</div>

<div class="box">
<h3>Configuració (fixa per franja)</h3>

Taula 1:
V <select id="t1V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t1H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br><br>

Taula 2:
V <select id="t2V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t2H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br>
<button onclick="guardarConfiguracio()">Guardar configuració</button>
</div>

<div class="box">
<h3>Resultats</h3>

Taula 1:
<input id="t1x" placeholder="x">
<input id="t1y" placeholder="y"><br>

Taula 2:
<input id="t2x" placeholder="x">
<input id="t2y" placeholder="y">
</div>

<button onclick="calcular()">Calcular ronda</button>
<button onclick="novaRonda()">Nova ronda</button>
<button onclick="resetSessio()">Reset sessió</button>

<h3>Resultat</h3>
<div id="resultat"></div>

<h3>Historial</h3>
<div id="historial"></div>

<h3>Ranking</h3>
<div id="ranking"></div>

<script>

let configuracions=[null,null,null];
let comptador=[0,0,0];
let historial=[[],[],[]];
let ranking=[0,0,0,0];

// BLOQUEIG
function bloquejarCamps(){
document.getElementById("t1x").disabled=true;
document.getElementById("t1y").disabled=true;
document.getElementById("t2x").disabled=true;
document.getElementById("t2y").disabled=true;
}

function desbloquejarCamps(){
document.getElementById("t1x").disabled=false;
document.getElementById("t1y").disabled=false;
document.getElementById("t2x").disabled=false;
document.getElementById("t2y").disabled=false;
}

// CANVI FRANJA
function canviarFranja(){
let f=document.getElementById("franja").value;

let info="";

if (configuracions[f]){
info+="✔ Configurada<br>";
info+="Jocs: "+comptador[f]+"/8";
} else {
info+="❌ No configurada";
}

if (comptador[f]===8){
info+="<br><span class='done'>Franja completada</span>";
}

document.getElementById("infoFranja").innerHTML=info;
}

// GUARDAR CONFIG
function guardarConfiguracio(){

let f=document.getElementById("franja").value;

if (comptador[f]>0){
alert("No es pot canviar configuració un cop iniciada");
return;
}

let t1V=document.getElementById("t1V").value;
let t1H=document.getElementById("t1H").value;
let t2V=document.getElementById("t2V").value;
let t2H=document.getElementById("t2H").value;

if ([t1V,t1H,t2V,t2H].includes("")){
alert("Falten parelles");
return;
}

let all=[t1V,t1H,t2V,t2H];
if (new Set(all).size!==4){
alert("Parelles repetides");
return;
}

configuracions[f]={
t1V:Number(t1V),
t1H:Number(t1H),
t2V:Number(t2V),
t2H:Number(t2H)
};

canviarFranja();
}

// CALCULAR
function calcular(){

let f=document.getElementById("franja").value;
let config=configuracions[f];

if (!config){
alert("Cal configurar la franja");
return;
}

if (comptador[f]>=8){
alert("Franja completa");
return;
}

let x1=document.getElementById("t1x").value;
let y1=document.getElementById("t1y").value;
let x2=document.getElementById("t2x").value;
let y2=document.getElementById("t2y").value;

if ((x1 && y1)||(!x1 && !y1)){
alert("Taula 1 incorrecta");
return;
}

if ((x2 && y2)||(!x2 && !y2)){
alert("Taula 2 incorrecta");
return;
}

x1=Number(x1)||0; y1=Number(y1)||0;
x2=Number(x2)||0; y2=Number(y2)||0;

let p1 = x1!==0 ? config.t1V : config.t1H;
let p2 = x2!==0 ? config.t2V : config.t2H;

let val1 = x1!==0 ? x1 : y1;
let val2 = x2!==0 ? x2 : y2;

let punts=[0,0,0,0];

if (val1===val2){
punts=[1,1,1,1];
} else {

let guanyador = val1>val2 ? p1 : p2;
let perdedor = val1>val2 ? p2 : p1;

function rival(p){
if (p===config.t1V) return config.t1H;
if (p===config.t1H) return config.t1V;
if (p===config.t2V) return config.t2H;
return config.t2V;
}

punts[guanyador]=2;
punts[rival(guanyador)]=0;
punts[perdedor]=0;
punts[rival(perdedor)]=2;
}

// acumulat
for (let i=0;i<4;i++){
ranking[i]+=punts[i];
}

historial[f].push(punts);
comptador[f]++;

// RESULTAT
document.getElementById("resultat").innerHTML =
"P1: "+punts[0]+"<br>"+
"P2: "+punts[1]+"<br>"+
"P3: "+punts[2]+"<br>"+
"P4: "+punts[3];

// HISTORIAL
let histHTML="";
for (let fr=0;fr<3;fr++){
histHTML+="<b>Franja "+(fr+1)+"</b><br>";
historial[fr].forEach((r,i)=>{
histHTML+="Joc "+(i+1)+": P1 "+r[0]+" P2 "+r[1]+" P3 "+r[2]+" P4 "+r[3]+"<br>";
});
histHTML+="<br>";
}
document.getElementById("historial").innerHTML=histHTML;

// RANKING
document.getElementById("ranking").innerHTML =
"P1: "+ranking[0]+"<br>"+
"P2: "+ranking[1]+"<br>"+
"P3: "+ranking[2]+"<br>"+
"P4: "+ranking[3];

// BLOQUEIG
bloquejarCamps();

canviarFranja();
}

// NOVA RONDA
function novaRonda(){

document.getElementById("t1x").value="";
document.getElementById("t1y").value="";
document.getElementById("t2x").value="";
document.getElementById("t2y").value="";

desbloquejarCamps();
}

// RESET
function resetSessio(){
configuracions=[null,null,null];
comptador=[0,0,0];
historial=[[],[],[]];
ranking=[0,0,0,0];

document.getElementById("resultat").innerHTML="";
document.getElementById("historial").innerHTML="";
document.getElementById("ranking").innerHTML="";
document.getElementById("infoFranja").innerHTML="";
}

</script>

</body>
</html>
