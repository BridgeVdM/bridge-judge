<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bridge Judge PRO</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.box { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
input, select { margin:5px; padding:5px; }
button { margin:5px; padding:10px; }
button:disabled { background:#ccc; color:#666; }
input:disabled { background:#ddd; }
</style>
</head>

<body>

<h2>Bridge Judge PRO</h2>

<div class="box">
<h3>Franja</h3>
<select id="franja">
<option value="0">Franja 1</option>
<option value="1">Franja 2</option>
<option value="2">Franja 3</option>
</select>
<div id="estatFranja"></div>
</div>

<div class="box">
<h3>Configuració</h3>

Taula 1:
V <select id="t1V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t1H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br><br>

Taula 2:
V <select id="t2V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t2H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br>
<button id="btnGuardar">Guardar configuració</button>
</div>

<div class="box">
<h3>Resultats</h3>

Taula 1:
<input id="t1v" placeholder="V">
<input id="t1h" placeholder="H"><br>

Taula 2:
<input id="t2v" placeholder="V">
<input id="t2h" placeholder="H">
</div>

<button id="btnCalc">Calcular ronda</button>
<button id="btnNova">Nova ronda</button>
<button id="btnReset">Reset sessió</button>

<h3>Resultat</h3>
<div id="resultat"></div>

<h3>Historial</h3>
<div id="historial"></div>

<h3>Resum per franges</h3>
<div id="resum"></div>

<h3>Ranking</h3>
<div id="ranking"></div>

<script>

function $(id){ return document.getElementById(id); }

let configuracions=[null,null,null];
let historial=[[],[],[]];
let ranking=[0,0,0,0];

let rondaGlobal=0;
let rondaCalculada=false;

// ---------- BLOQUEIG FRANJA ----------
function bloquejarFranja(){
  $("franja").disabled = true;
}

// ---------- GUARDAR ----------
function guardarDades(){
localStorage.setItem("bridgeJudgePRO", JSON.stringify({
configuracions,historial,ranking,rondaGlobal
}));
}

function carregarDades(){
let d=localStorage.getItem("bridgeJudgePRO");
if(!d) return;

let obj=JSON.parse(d);
configuracions=obj.configuracions||[null,null,null];
historial=obj.historial||[[],[],[]];
ranking=obj.ranking||[0,0,0,0];
rondaGlobal=obj.rondaGlobal||0;

actualitzarUI();
}

// ---------- UI ----------
function actualitzarUI(){

let h="";
for(let f=0;f<3;f++){
h+="<b>Franja "+(f+1)+"</b><br>";
historial[f].forEach((r,i)=>{
h+="Joc "+(i+1)+": "+r.join(", ")+"<br>";
});
h+="<br>";
}
$("historial").innerHTML=h;

let resum="";
for(let f=0;f<3;f++){
let total=[0,0,0,0];
historial[f].forEach(r=>{
for(let i=0;i<4;i++) total[i]+=r[i];
});
resum+="Franja "+(f+1)+": P1="+total[0]+" P2="+total[1]+" P3="+total[2]+" P4="+total[3]+"<br>";
}
$("resum").innerHTML=resum;

let c=[
{p:"P1",pts:ranking[0]},
{p:"P2",pts:ranking[1]},
{p:"P3",pts:ranking[2]},
{p:"P4",pts:ranking[3]}
];

c.sort((a,b)=>b.pts-a.pts);

let html="";
c.forEach((e,i)=>{
html+=(i+1)+"º - "+e.p+": "+e.pts+" punts"+(i===0?" 🏆":"")+"<br>";
});

$("ranking").innerHTML=html;

// FORÇAR FRANJA REAL
let f=Math.floor(rondaGlobal/8);
$("franja").value=String(f);
$("estatFranja").innerHTML="Ronda "+(rondaGlobal+1)+" / 24 — Franja "+(f+1);
}

// ---------- CONFIG ----------
function guardar(){

let f=Math.floor(rondaGlobal/8);

if(historial[f].length>0){
alert("No es pot canviar configuració en aquesta franja");
return;
}

let vals=[$("t1V").value,$("t1H").value,$("t2V").value,$("t2H").value];

if(vals.includes("")){
alert("Falten parelles");
return;
}

if(new Set(vals).size!==4){
alert("Parelles repetides");
return;
}

configuracions[f]={
t1V:Number(vals[0]),
t1H:Number(vals[1]),
t2V:Number(vals[2]),
t2H:Number(vals[3])
};

guardarDades();
alert("Configuració guardada");
}

// ---------- UTIL ----------
function rival(x,config){
if(x===config.t1V) return config.t1H;
if(x===config.t1H) return config.t1V;
if(x===config.t2V) return config.t2H;
return config.t2V;
}

// ---------- NOVA FRANJA ----------
function novaFranja(){

$("t1v").value="";
$("t1h").value="";
$("t2v").value="";
$("t2h").value="";

rondaCalculada=false;

alert("⚠️ Nova franja: configura taules");
}

// ---------- CALCULAR ----------
function calcular(){

if(rondaCalculada){
alert("Ja calculada");
return;
}

if(rondaGlobal>=24){
alert("Torneig finalitzat");
return;
}

let f=Math.floor(rondaGlobal/8);
let config=configuracions[f];

if(!config){
alert("Configura la franja");
return;
}

let M=[
[Number($("t1v").value)||0, Number($("t1h").value)||0],
[Number($("t2v").value)||0, Number($("t2h").value)||0]
];

// validació
if((M[0][0]&&M[0][1])||(!M[0][0]&&!M[0][1])) return alert("Error T1");
if((M[1][0]&&M[1][1])||(!M[1][0]&&!M[1][1])) return alert("Error T2");

// extreure valors
let vals=[],pos=[];
for(let i=0;i<2;i++){
for(let j=0;j<2;j++){
if(M[i][j]!==0){
vals.push(M[i][j]);
pos.push([i,j]);
}
}
}

let v1=vals[0], v2=vals[1];
let [i1,j1]=pos[0];
let [i2,j2]=pos[1];

let p1=(i1===0?(j1===0?config.t1V:config.t1H):(j1===0?config.t2V:config.t2H));
let p2=(i2===0?(j2===0?config.t1V:config.t1H):(j2===0?config.t2V:config.t2H));

let punts=[0,0,0,0];

// REGLES
if(v1===v2){
punts=[1,1,1,1];

}else{

let mateixaLinia=(j1===j2);
let compleix1=(j1===0);
let compleix2=(j2===0);

if(mateixaLinia && compleix1!==compleix2){

let guanya=compleix1?p1:p2;
let perd=compleix1?p2:p1;

punts[guanya]=2;
punts[perd]=0;
punts[rival(guanya,config)]=0;
punts[rival(perd,config)]=2;

}else{

let guanya=v1>v2?p1:p2;
let perd=v1>v2?p2:p1;

punts[guanya]=2;
punts[perd]=0;
punts[rival(guanya,config)]=0;
punts[rival(perd,config)]=2;
}
}

// acumular
for(let i=0;i<4;i++) ranking[i]+=punts[i];
historial[f].push(punts);

// UI
$("resultat").innerHTML=
"P1: "+punts[0]+"<br>"+
"P2: "+punts[1]+"<br>"+
"P3: "+punts[2]+"<br>"+
"P4: "+punts[3];

actualitzarUI();

rondaCalculada=true;
rondaGlobal++;

// 🔥 CORRECCIÓ: actualitzar UI immediatament en canvi de franja
if(rondaGlobal===8 || rondaGlobal===16){
novaFranja();
actualitzarUI();
}

guardarDades();
}

// ---------- NOVA ----------
function nova(){
$("t1v").value="";
$("t1h").value="";
$("t2v").value="";
$("t2h").value="";
rondaCalculada=false;
}

// ---------- RESET ----------
function resetSessio(){

if(!confirm("Reiniciar sessió?")) return;

configuracions=[null,null,null];
historial=[[],[],[]];
ranking=[0,0,0,0];
rondaGlobal=0;
rondaCalculada=false;

$("resultat").innerHTML="";
$("historial").innerHTML="";
$("ranking").innerHTML="";
$("resum").innerHTML="";

nova();
guardarDades();
}

// ---------- EVENTS ----------
btnCalc.onclick=calcular;
btnNova.onclick=nova;
btnGuardar.onclick=guardar;
btnReset.onclick=resetSessio;

carregarDades();
bloquejarFranja();

</script>

</body>
</html>
