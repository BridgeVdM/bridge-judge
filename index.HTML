<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bridge Judge PRO</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.box { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
input, select { margin:5px; padding:5px; }
button { margin:5px; padding:10px; }
input:disabled { background:#ddd; }
</style>

</head>
<body>

<h2>Bridge Judge PRO</h2>

<div class="box">
<h3>Franja</h3>
<select id="franja">
<option value="0">Franja 1</option>
<option value="1">Franja 2</option>
<option value="2">Franja 3</option>
</select>
<div id="infoFranja"></div>
</div>

<div class="box">
<h3>Configuració</h3>

Taula 1:
V <select id="t1V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t1H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br><br>

Taula 2:
V <select id="t2V"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>
H <select id="t2H"><option value="">--</option><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option></select>

<br>
<button id="btnGuardar">Guardar configuració</button>
</div>

<div class="box">
<h3>Resultats</h3>

Taula 1:
<input id="t1x" placeholder="x">
<input id="t1y" placeholder="y"><br>

Taula 2:
<input id="t2x" placeholder="x">
<input id="t2y" placeholder="y">
</div>

<button id="btnCalc">Calcular ronda</button>
<button id="btnNova">Nova ronda</button>

<h3>Resultat</h3>
<div id="resultat"></div>

<script>

// variables globals correctes
let configuracions=[null,null,null];
let comptador=[0,0,0];

// helper DOM
function $(id){ return document.getElementById(id); }

// BLOQUEIG
function bloquejar(){
$("t1x").disabled=true;
$("t1y").disabled=true;
$("t2x").disabled=true;
$("t2y").disabled=true;
}

function desbloquejar(){
$("t1x").disabled=false;
$("t1y").disabled=false;
$("t2x").disabled=false;
$("t2y").disabled=false;
}

// CONFIG
function guardar(){

let f=$("franja").value;

let t1V=$("t1V").value;
let t1H=$("t1H").value;
let t2V=$("t2V").value;
let t2H=$("t2H").value;

if([t1V,t1H,t2V,t2H].includes("")){
alert("Falten parelles");
return;
}

if(new Set([t1V,t1H,t2V,t2H]).size!==4){
alert("Parelles repetides");
return;
}

configuracions[f]={
t1V:Number(t1V),
t1H:Number(t1H),
t2V:Number(t2V),
t2H:Number(t2H)
};

alert("Configuració guardada");
}

// CALCULAR
function calcular(){

let f=$("franja").value;
let config=configuracions[f];

if(!config){
alert("Configura la franja");
return;
}

let x1=$("t1x").value;
let y1=$("t1y").value;
let x2=$("t2x").value;
let y2=$("t2y").value;

if((x1 && y1)||(!x1 && !y1)){
alert("Error taula 1");
return;
}

if((x2 && y2)||(!x2 && !y2)){
alert("Error taula 2");
return;
}

x1=Number(x1)||0; y1=Number(y1)||0;
x2=Number(x2)||0; y2=Number(y2)||0;

let p1 = x1!==0 ? config.t1V : config.t1H;
let p2 = x2!==0 ? config.t2V : config.t2H;

let v1 = x1!==0 ? x1 : y1;
let v2 = x2!==0 ? x2 : y2;

let punts=[0,0,0,0];

if(v1===v2){
punts=[1,1,1,1];
}else{

let g = v1>v2 ? p1 : p2;
let p = v1>v2 ? p2 : p1;

function rival(x){
if(x===config.t1V) return config.t1H;
if(x===config.t1H) return config.t1V;
if(x===config.t2V) return config.t2H;
return config.t2V;
}

punts[g]=2;
punts[rival(g)]=0;
punts[p]=0;
punts[rival(p)]=2;
}

$("resultat").innerHTML =
"P1: "+punts[0]+"<br>"+
"P2: "+punts[1]+"<br>"+
"P3: "+punts[2]+"<br>"+
"P4: "+punts[3];

bloquejar();
}

// NOVA RONDA
function nova(){
$("t1x").value="";
$("t1y").value="";
$("t2x").value="";
$("t2y").value="";
desbloquejar();
}

// EVENTS SEGURS MÒBIL
window.onload=function(){
$("btnCalc").addEventListener("click", calcular);
$("btnNova").addEventListener("click", nova);
$("btnGuardar").addEventListener("click", guardar);
};

</script>

</body>
</html>
